# Cargo Deny Configuration for TorchForge Bench
# This file enforces dependency policies and license compliance

# License configuration
[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "ISC",
    "OpenSSL",
]
confidence-threshold = 0.8

# Bans configuration
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# Specific bans for security or compatibility reasons
[[bans.deny]]
name = "openssl-sys"
reason = "Prefer rustls for TLS implementation"

[[bans.deny]]
name = "openssl"
reason = "Prefer rustls for TLS implementation"

# Advisory configuration
[advisories]

# Sources configuration
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
