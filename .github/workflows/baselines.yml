name: Python Baselines

on:
  workflow_dispatch:
    inputs:
      baseline:
        description: 'Baseline to run'
        required: true
        default: 'dqn_cartpole'
        type: choice
        options:
          - dqn_cartpole
      seed:
        description: 'Random seed'
        required: false
        default: '1'
        type: string
      episodes:
        description: 'Number of episodes'
        required: false
        default: '1000'
        type: string
      capture_video:
        description: 'Capture video'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  run-baselines:
    name: Run Python Baselines
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('baselines/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install dependencies
      run: |
        cd baselines
        uv sync

    - name: Check GPU availability
      run: |
        cd baselines
        uv run python -c 'import torch; print(f"PyTorch: {torch.__version__}"); print(f"CUDA: {torch.cuda.is_available()}"); print(f"GPU: {torch.cuda.device_count() if torch.cuda.is_available() else 0}")'

    - name: Run baseline
      run: |
        cd baselines
        args=""
        if [ -n "${{ github.event.inputs.seed }}" ]; then
          args="$args --seed ${{ github.event.inputs.seed }}"
        fi
        if [ -n "${{ github.event.inputs.episodes }}" ]; then
          args="$args --episodes ${{ github.event.inputs.episodes }}"
        fi
        if [ "${{ github.event.inputs.capture_video }}" == "true" ]; then
          args="$args --capture-video"
        fi
        
        echo "Running: uv run python ${{ github.event.inputs.baseline }}.py $args"
        uv run python ${{ github.event.inputs.baseline }}.py $args

    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: baseline-results-${{ github.event.inputs.baseline }}-${{ github.run_number }}
        path: |
          baselines/results/
          baselines/videos/
        retention-days: 30

    - name: Upload logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: baseline-logs-${{ github.event.inputs.baseline }}-${{ github.run_number }}
        path: |
          baselines/logs/
        retention-days: 7

    - name: Generate summary
      run: |
        cd baselines
        if [ -f "results/${{ github.event.inputs.baseline }}_results.json" ]; then
          echo "## Baseline Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat "results/${{ github.event.inputs.baseline }}_results.json" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "## Baseline Results" >> $GITHUB_STEP_SUMMARY
          echo "No results file found. Check the logs for errors." >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Environment Information" >> $GITHUB_STEP_SUMMARY
        echo "- **Baseline**: ${{ github.event.inputs.baseline }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Seed**: ${{ github.event.inputs.seed }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Episodes**: ${{ github.event.inputs.episodes }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Python**: 3.12" >> $GITHUB_STEP_SUMMARY
        echo "- **OS**: Ubuntu (GitHub Actions)" >> $GITHUB_STEP_SUMMARY
